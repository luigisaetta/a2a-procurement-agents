name: a2a-procurement-agents

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: procurement_demo
      MYSQL_USER: ${MYSQL_USER:-procurement_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-procurement_app_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-procurement_root_password}
    command:
      - --local-infile=1
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d:ro
      - ../../specs/examples/data:/seed-data:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  offer-evaluation-agent:
    build:
      context: ../..
      dockerfile: deployments/docker-compose/Dockerfile.agent
      args:
        SERVICE_PATH: services/offer-evaluation-agent
        AGENT_MODULE: offer_evaluation_agent.server
    image: a2a-procurement/offer-evaluation-agent:local
    environment:
      OCI_REGION: ${OCI_REGION}
      OCI_AUTH: ${OCI_AUTH}
      OCI_MODEL_ID: ${OCI_MODEL_ID}
      OCI_COMPARTMENT_ID: ${OCI_COMPARTMENT_ID}
      OCI_PROFILE: ${OCI_PROFILE:-DEFAULT}
      OFFER_EVALUATION_AGENT_PORT: ${OFFER_EVALUATION_AGENT_PORT:-8001}
      OFFER_EVALUATION_AGENT_TELEMETRY_ENABLED: ${OFFER_EVALUATION_AGENT_TELEMETRY_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-otlp}
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-otlp}
      OTEL_METRIC_EXPORT_INTERVAL: ${OTEL_METRIC_EXPORT_INTERVAL:-5000}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=local}
      AGENT_API_KEY: ${AGENT_API_KEY}
    ports:
      - "${OFFER_EVALUATION_AGENT_PORT:-8001}:${OFFER_EVALUATION_AGENT_PORT:-8001}"
    volumes:
      - ${OCI_CONFIG_DIR:-~/.oci}:/root/.oci:ro

  procurement-orchestrator:
    build:
      context: ../..
      dockerfile: deployments/docker-compose/Dockerfile.agent
      args:
        SERVICE_PATH: services/procurement-orchestrator
        AGENT_MODULE: procurement_orchestrator.server
    image: a2a-procurement/procurement-orchestrator:local
    environment:
      PROCUREMENT_ORCHESTRATOR_PORT: ${PROCUREMENT_ORCHESTRATOR_PORT:-8003}
      PROCUREMENT_ORCHESTRATOR_TELEMETRY_ENABLED: ${PROCUREMENT_ORCHESTRATOR_TELEMETRY_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-otlp}
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-otlp}
      OTEL_METRIC_EXPORT_INTERVAL: ${OTEL_METRIC_EXPORT_INTERVAL:-5000}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=local}
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      BID_COLLECTION_AGENT_URL: ${BID_COLLECTION_AGENT_URL:-http://bid-collection-agent:8000}
      OFFER_EVALUATION_AGENT_URL: ${OFFER_EVALUATION_AGENT_URL:-http://offer-evaluation-agent:8001}
      PURCHASE_ORDER_AGENT_URL: ${PURCHASE_ORDER_AGENT_URL:-http://purchase-order-agent:8002}
    ports:
      - "${PROCUREMENT_ORCHESTRATOR_PORT:-8003}:${PROCUREMENT_ORCHESTRATOR_PORT:-8003}"
    depends_on:
      bid-collection-agent:
        condition: service_started
      offer-evaluation-agent:
        condition: service_started
      purchase-order-agent:
        condition: service_started

  conversational-procurement-intake:
    build:
      context: ../..
      dockerfile: deployments/docker-compose/Dockerfile.agent
      args:
        SERVICE_PATH: services/conversational-procurement-intake
        AGENT_MODULE: conversational_procurement_intake.server
    image: a2a-procurement/conversational-procurement-intake:local
    environment:
      CONVERSATIONAL_INTAKE_PORT: ${CONVERSATIONAL_INTAKE_PORT:-8012}
      CONVERSATIONAL_INTAKE_EXTRACTOR_MODE: ${CONVERSATIONAL_INTAKE_EXTRACTOR_MODE:-llm}
      PROCUREMENT_ORCHESTRATOR_URL: ${PROCUREMENT_ORCHESTRATOR_URL:-http://procurement-orchestrator:8003}
      PROCUREMENT_DATA_MCP_URL: ${PROCUREMENT_DATA_MCP_URL:-http://procurement-data-mcp:8011/mcp}
      PROCUREMENT_DATA_MCP_TIMEOUT_SECONDS: ${PROCUREMENT_DATA_MCP_TIMEOUT_SECONDS:-10}
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      OCI_REGION: ${OCI_REGION}
      OCI_AUTH: ${OCI_AUTH}
      OCI_MODEL_ID: ${OCI_MODEL_ID}
      OCI_COMPARTMENT_ID: ${OCI_COMPARTMENT_ID}
      OCI_PROFILE: ${OCI_PROFILE:-DEFAULT}
    ports:
      - "${CONVERSATIONAL_INTAKE_PORT:-8012}:${CONVERSATIONAL_INTAKE_PORT:-8012}"
    volumes:
      - ${OCI_CONFIG_DIR:-~/.oci}:/root/.oci:ro
    depends_on:
      procurement-data-mcp:
        condition: service_started
      procurement-orchestrator:
        condition: service_started

  procurement-intake-ui:
    profiles:
      - ui
    build:
      context: ../..
      dockerfile: services/procurement-intake-ui/Dockerfile
    image: a2a-procurement/procurement-intake-ui:local
    environment:
      PORT: ${PROCUREMENT_INTAKE_UI_PORT:-3000}
      HOSTNAME: 0.0.0.0
      CONVERSATIONAL_INTAKE_BASE_URL: ${CONVERSATIONAL_INTAKE_BASE_URL:-http://conversational-procurement-intake:8012}
    ports:
      - "${PROCUREMENT_INTAKE_UI_PORT:-3000}:${PROCUREMENT_INTAKE_UI_PORT:-3000}"
    depends_on:
      conversational-procurement-intake:
        condition: service_started

  bid-collection-agent:
    build:
      context: ../..
      dockerfile: deployments/docker-compose/Dockerfile.agent
      args:
        SERVICE_PATH: services/bid-collection-agent
        AGENT_MODULE: bid_collection_agent.server
    image: a2a-procurement/bid-collection-agent:local
    environment:
      BID_COLLECTION_AGENT_PORT: ${BID_COLLECTION_AGENT_PORT:-8000}
      BID_COLLECTION_AGENT_TELEMETRY_ENABLED: ${BID_COLLECTION_AGENT_TELEMETRY_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-otlp}
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-otlp}
      OTEL_METRIC_EXPORT_INTERVAL: ${OTEL_METRIC_EXPORT_INTERVAL:-5000}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=local}
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      PROCUREMENT_DATA_MCP_URL: ${PROCUREMENT_DATA_MCP_URL:-http://procurement-data-mcp:8011/mcp}
      PROCUREMENT_DATA_MCP_TIMEOUT_SECONDS: ${PROCUREMENT_DATA_MCP_TIMEOUT_SECONDS:-10}
    ports:
      - "${BID_COLLECTION_AGENT_PORT:-8000}:${BID_COLLECTION_AGENT_PORT:-8000}"
    depends_on:
      procurement-data-mcp:
        condition: service_started

  procurement-data-mcp:
    build:
      context: ../..
      dockerfile: deployments/docker-compose/Dockerfile.mcp
      args:
        SERVICE_PATH: services/procurement-data-mcp
        MCP_MODULE: procurement_data_mcp.server
    image: a2a-procurement/procurement-data-mcp:local
    environment:
      PROCUREMENT_DB_HOST: mysql
      PROCUREMENT_DB_PORT: 3306
      PROCUREMENT_DB_NAME: procurement_demo
      PROCUREMENT_DB_USER: ${MYSQL_USER:-procurement_app}
      PROCUREMENT_DB_PASSWORD: ${MYSQL_PASSWORD:-procurement_app_password}
      PROCUREMENT_DATA_MCP_PORT: ${PROCUREMENT_DATA_MCP_PORT:-8011}
    ports:
      - "${PROCUREMENT_DATA_MCP_PORT:-8011}:${PROCUREMENT_DATA_MCP_PORT:-8011}"
    depends_on:
      mysql:
        condition: service_healthy

  purchase-order-agent:
    build:
      context: ../..
      dockerfile: deployments/docker-compose/Dockerfile.agent
      args:
        SERVICE_PATH: services/purchase-order-agent
        AGENT_MODULE: purchase_order_agent.server
    image: a2a-procurement/purchase-order-agent:local
    environment:
      OCI_REGION: ${OCI_REGION}
      OCI_AUTH: ${OCI_AUTH}
      OCI_MODEL_ID: ${OCI_MODEL_ID}
      OCI_COMPARTMENT_ID: ${OCI_COMPARTMENT_ID}
      PURCHASE_ORDER_AGENT_PORT: ${PURCHASE_ORDER_AGENT_PORT:-8002}
      PURCHASE_ORDER_STORAGE_BACKEND: ${PURCHASE_ORDER_STORAGE_BACKEND:-mysql}
      PROCUREMENT_DB_HOST: mysql
      PROCUREMENT_DB_PORT: 3306
      PROCUREMENT_DB_NAME: procurement_demo
      PROCUREMENT_DB_USER: ${MYSQL_USER:-procurement_app}
      PROCUREMENT_DB_PASSWORD: ${MYSQL_PASSWORD:-procurement_app_password}
      PURCHASE_ORDER_AGENT_TELEMETRY_ENABLED: ${PURCHASE_ORDER_AGENT_TELEMETRY_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-otlp}
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-otlp}
      OTEL_METRIC_EXPORT_INTERVAL: ${OTEL_METRIC_EXPORT_INTERVAL:-5000}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=local}
      AGENT_API_KEY: ${AGENT_API_KEY}
    ports:
      - "${PURCHASE_ORDER_AGENT_PORT:-8002}:${PURCHASE_ORDER_AGENT_PORT:-8002}"
    depends_on:
      mysql:
        condition: service_healthy

  otel-collector:
    profiles:
      - observability
    image: otel/opentelemetry-collector-contrib:0.116.1
    command:
      - "--config=/etc/otelcol-contrib/config.yaml"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
      - "${OTEL_PROMETHEUS_PORT:-9464}:9464"

  prometheus:
    profiles:
      - observability
    image: prom/prometheus:v2.55.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      otel-collector:
        condition: service_started

  grafana:
    profiles:
      - observability
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      prometheus:
        condition: service_started

volumes:
  mysql-data:
  prometheus-data:
  grafana-data:
